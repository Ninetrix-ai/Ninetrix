agents:
  hello-world:
    metadata:
      name: hello-world
      role: Helpful assistant
      goal: Answer the user's question using web search when needed
      instructions: |
        You are a helpful assistant. Use the web_search tool to look up
        current information when you need it. Be concise and accurate.

    runtime:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.2

    tools:
      - name: web_search
        source: mcp://brave-search
